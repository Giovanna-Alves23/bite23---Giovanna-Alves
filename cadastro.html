<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bit 23 | Cadastro</title>

    <link rel="stylesheet" href="bit23.css">
    <link rel="preconnect" href="https://fonts.gstatic.com" />
     <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Single:wght@100..900&dis">
</head>
<body class="background">

  <div class="cadastro">
  <a href="index.html" class="voltar"><img class="img1" src="setinha.png"></a>
    <div class="container">
      <div class="card">
        <h2>CADASTRO</h2>
        <div class="formulario">
          <div class="campo">
            <span>Código de ativação:</span>
            <input id="codigo_input" type="text" placeholder="Insira aqui seu código" />
          </div>
          <div class="campo">
            <span>Nome:</span>
            <input id="nome_input" type="text" placeholder="Seu nome" />
          </div>
          <div class="campo">
            <span>E-mail:</span>
            <input id="email_input" type="text" placeholder="meuemail@provedor.com" />
          </div>
          <div class="campo">
            <span>Senha:</span>
            <input id="senha_input" type="password" placeholder="******" />
          </div>
          <div class="campo">
            <span>Confirmação da Senha:</span>
            <input id="confirmacao_senha_input" type="password" placeholder="******" />
          </div>
        </div>
        <a class="botao" href="login.html">Cadastrar</a>
      </div>
    </div>
    <div class="img2">
      <p class="texto">Bem vindo à sua nova aventura!</p>
    </div>
    
  </div>  
    
</body>
</html>
